<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="auth-container">
    <h1>프로필 관리 사이트</h1>
    <p>새 계정을 생성하세요.</p>

    <div class="card">
      <h2>회원가입</h2>

      <input type="text" id="registerUsername" placeholder="이름">
      <input type="email" id="registerEmail" placeholder="이메일">
      <input type="password" id="registerPassword" placeholder="비밀번호">

      <button id="registerBtn">회원가입</button>

      <p class="link-text">
        이미 계정이 있나요?
        <a href="/static/login.html">로그인</a>
      </p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
